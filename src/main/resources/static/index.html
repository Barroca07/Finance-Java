<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App | Java</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar lateral animada futuramente ou cabeçalho superior -->
        <header class="top-nav">
            <div class="logo">
                <i class="ph-bold ph-wallet"></i>
                <h2>FinBoard</h2>
            </div>
            <div class="user-profile" style="display: flex; align-items: center; gap: 15px;">
                <div class="avatar" title="Seu Perfil">--</div>
                <button onclick="logout()" class="btn-delete" title="Sair" style="font-size: 1.5rem;">
                    <i class="ph-bold ph-sign-out"></i>
                </button>
            </div>
        </header>

        <main class="dashboard">
            <!-- Barra de Filtro -->
            <section class="filter-section glass-effect"
                style="margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; padding: 15px 24px;">
                <h3 style="font-size: 1.1rem; color: var(--text-primary); margin: 0;">Resumo Mensal</h3>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button id="prev-month" title="Mês Anterior"
                        style="background: rgba(255, 255, 255, 0.1); border: none; color: var(--text-primary); padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s;"><i
                            class="ph-bold ph-caret-left"></i></button>
                    <input type="month" id="month-filter"
                        style="width: auto; padding: 8px 12px; margin: 0; text-align: center;">
                    <button id="next-month" title="Próximo Mês"
                        style="background: rgba(255, 255, 255, 0.1); border: none; color: var(--text-primary); padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s;"><i
                            class="ph-bold ph-caret-right"></i></button>
                </div>
            </section>

            <!-- Widgets de Resumo -->
            <section class="summary-cards">
                <div class="card glass-effect">
                    <div class="card-header">
                        <span>Receitas</span>
                        <i class="ph ph-arrow-circle-up text-green"></i>
                    </div>
                    <h3 id="income-total">R$ 0,00</h3>
                </div>
                <div class="card glass-effect">
                    <div class="card-header">
                        <span>Despesas</span>
                        <i class="ph ph-arrow-circle-down text-red"></i>
                    </div>
                    <h3 id="expense-total">R$ 0,00</h3>
                </div>
                <div class="card glass-effect total-card">
                    <div class="card-header">
                        <span>Saldo Total</span>
                        <i class="ph ph-currency-circle-dollar text-blue"></i>
                    </div>
                    <h3 id="balance-total">R$ 0,00</h3>
                </div>
            </section>

            <!-- Área Inferior: Formulário e Lista -->
            <section class="content-grid">
                <!-- Seção de Inserção -->
                <div class="form-section glass-effect">
                    <h2>Nova Transação</h2>
                    <form id="transaction-form">
                        <div class="input-group">
                            <label>Descrição</label>
                            <input type="text" id="desc" required placeholder="Ex: Conta de Luz">
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label>Valor</label>
                                <input type="number" step="0.01" id="amount" required placeholder="0.00">
                            </div>
                            <div class="input-group">
                                <label>Data</label>
                                <input type="date" id="date" required>
                            </div>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label>Tipo</label>
                                <select id="type" required>
                                    <option value="RECEITA">Receita</option>
                                    <option value="DESPESA">Despesa</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Categoria</label>
                                <select id="category" required>
                                    <option value="CASA">Casa</option>
                                    <option value="ALIMENTACAO">Alimentação</option>
                                    <option value="TRANSPORTE">Transporte</option>
                                    <option value="LAZER">Lazer</option>
                                    <option value="SALARIO">Salário</option>
                                    <option value="ESTUDOS">Estudos</option>
                                    <option value="OUTROS">Outros</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">
                            <i class="ph-bold ph-plus"></i> Adicionar
                        </button>
                    </form>
                </div>

                <!-- Tabela de Transações -->
                <div class="list-section glass-effect">
                    <h2>Últimas Transações</h2>
                    <div class="table-responsive">
                        <table id="transactions-table">
                            <thead>
                                <tr>
                                    <th>Descrição</th>
                                    <th>Categoria</th>
                                    <th>Data</th>
                                    <th>Valor</th>
                                    <th>Ação</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list">
                                <!-- Preenchido dinamicamente pelo JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Dashboard Charts -->
            <section class="dashboard-charts glass-effect" style="margin-top: 30px;">
                <h2>Gastos por Categoria</h2>
                <div class="chart-container"
                    style="position: relative; height: 350px; width: 100%; display: flex; justify-content: center;">
                    <canvas id="category-chart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
